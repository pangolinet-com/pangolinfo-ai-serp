identity:
  name: "scrape_map"
  author: "pangolinfo"
  label:
    en_US: "Map Data"
    zh_Hans: "本地地图商家数据"
description:
  human:
    en_US: "Scrape high-fidelity local business intelligence, including names, addresses, ratings,
      and coordinates. Perfect for building local SEO agents, lead generation workflows, and regional competitor analysis tools."
    zh_Hans: "抓取高保真的本地商家情报，包括名称、地址、评分、联系方式及经纬度。完美适用于构建本地 SEO agents、自动化获客流及区域竞品分析工具。"
  llm: "Pangolin API integration for web scraping."
parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: "Query keyword."
      zh_Hans: "检索关键词"
    human_description:
      en_US: "Query keyword."
      zh_Hans: "检索关键词"
    llm_description: "Pangolin API integration for web scraping."
    form: llm
  - name: hl
    type: string
    required: false
    label:
      en_US: "Interface language."
      zh_Hans: "界面语言"
    human_description:
      en_US: "Interface language."
      zh_Hans: "界面语言"
    llm_description: "Pangolin API integration for web scraping."
    form: llm
  - name: ll
    type: string
    required: false
    label:
